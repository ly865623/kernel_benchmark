  summary: 'Comparison-ready baseline: measured B200 ground-truth latency of FlashMLA
    DSA sparse-prefill kernel sparse_attn_fwd across 10 representative configs (3
    shape families, s_kv 8k-64k). Correctness PASS, 3-pass repeatability <1.2% for
    9/10 configs, TFLOPS cross-validated vs README. Naive-roofline context error 12-25%
    recorded as the bar the interpretable micro-kernel model must beat. Decode kernel
    deferred to experiment stage.'
  baseline_kind: local
  primary_metric:
    metric_id: latency_us
    value: 1694.51
    direction: minimize
  metrics_summary:
    latency_us: 1694.51
    tflops: 1378.84
